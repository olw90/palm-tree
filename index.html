<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معلم دهانات وديكورات الطاف | فخامة وإتقان</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-gold: #aa8c2e;
            --black: #0a0a0a;
            --marble: #f8f9fa;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--black);
            color: white;
            scroll-behavior: smooth;
        }

        header {
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            padding: 20px 5%;
            position: fixed;
            width: 90%;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }

        .logo { font-size: 24px; font-weight: bold; color: var(--gold); }

        .hero {
            height: 80vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1560448204-603b3fc33ddc?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }

        .hero h1 { font-size: 2.5rem; color: var(--gold); }

        .gallery-container { padding: 60px 5%; background-color: var(--black); }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .video-card { border: 2px solid var(--gold); border-radius: 10px; overflow: hidden; background: #1a1a1a; }
        video { width: 100%; display: block; }

        .booking-section { padding: 60px 5%; background: var(--marble); color: var(--black); text-align: center; }
        .booking-form { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); border-top: 5px solid var(--gold); }
        .booking-form input, .booking-form textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-family: inherit; }
        
        .btn-gold { background: var(--gold); color: var(--black); padding: 15px 30px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.1rem; }

        footer { background: #000; padding: 30px; text-align: center; border-top: 1px solid var(--gold); }
        .whatsapp-float { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; z-index: 1000; text-decoration: none; }
    </style>
</head>
<body>

    <header>
        <div class="logo">معلم دهانات الطاف</div>
    </header>

    <section class="hero">
        <h1>إتقان، فخامة، وخبرة 25 عاماً</h1>
        <p>نحول جدران منزلك إلى لوحات فنية في الطائف</p>
    </section>

    <section class="gallery-container">
        <h2 style="text-align:center; color:var(--gold)">معرض الأعمال</h2>
        <div class="video-grid">
            <div class="video-card"><video controls preload="none"><source src="https://flowbit-848effb22be6.herokuapp.com/dl/53885/video-2026-05-03_01-48-23.mp4?code=8b8c2bb689fbe05055ab5997-5905562720" type="video/mp4"></video></div>
            <div class="video-card"><video controls preload="none"><source src="https://flowbit-848effb22be6.herokuapp.com/dl/53886/video-2026-05-03_01-50-52.mp4?code=2b697201b26972c625c0fddd-5905562720" type="video/mp4"></video></div>
            <div class="video-card"><video controls preload="none"><source src="https://flowbit-848effb22be6.herokuapp.com/dl/53887/video-2026-05-03_01-51-41.mp4?code=f3c23c71c565927a2a17ea06" type="video/mp4"></video></div>
        </div>
    </section>

    <section class="booking-section">
        <h2 style="margin-bottom:20px;">احجز موعدك عبر الواتساب</h2>
        <div class="booking-form">
            <input type="text" id="custName" placeholder="الاسم الكريم" required>
            <textarea id="custWork" placeholder="ما هو نوع العمل المطلوب؟ (دهانات، ديكور، فوم...)" rows="3"></textarea>
            <input type="date" id="custDate">
            <input type="time" id="custTime">
            <button class="btn-gold" onclick="sendToWhatsApp()">إرسال الطلب عبر واتساب</button>
        </div>
    </section>

    <footer>
        <p>معلم دهانات وديكورات الطائف: 966554374134+</p>
        <p style="font-size: 12px; color: #888;">جميع الحقوق محفوظة لدى أيمن هاشم © 2026</p>
    </footer>

    <a href="https://wa.me/966554374134" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        function sendToWhatsApp() {
            // جلب البيانات من الخانات
            const name = document.getElementById('custName').value;
            const work = document.getElementById('custWork').value;
            const date = document.getElementById('custDate').value;
            const time = document.getElementById('custTime').value;

            if(name === "") {
                alert("يرجى كتابة الاسم أولاً");
                return;
            }

            // تجهيز نص الرسالة
            const message = `مرحباً معلم الطاف، أرغب في حجز موعد:%0A%0A` + 
                            `👤 الاسم: ${name}%0A` +
                            `🛠 العمل المطلوب: ${work}%0A` +
                            `📅 التاريخ: ${date}%0A` +
                            `⏰ الوقت: ${time}`;

            // رابط الواتساب المباشر مع النص
            const whatsappURL = `https://wa.me/966554374134?text=${message}`;

            // فتح الرابط في نافذة جديدة
            window.open(whatsappURL, '_blank');
        }
    </script>

</body>
</html>
